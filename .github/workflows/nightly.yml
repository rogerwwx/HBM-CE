name: Nightly Gradle Build

on:
  schedule:
    - cron: '55 23 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------
      # 🔥 安全的 RFG 缓存（不会污染）
      # -------------------------------
      - name: Cache RFG sources
        uses: actions/cache@v4
        with:
          path: build/rfg
          key: rfg-${{ runner.os }}-mc1.12.2-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'src/main/resources/hbm_at.cfg', 'patches/**', 'buildscript.properties', 'gradle-wrapper.properties') }}
          restore-keys: |
            rfg-${{ runner.os }}-mc1.12.2-

      - name: Read modVersion from gradle.properties
        id: ver
        run: |
          set -euo pipefail
          MOD_VERSION=$(grep -E '^\s*modVersion\s*=' gradle.properties | sed -E 's/^\s*modVersion\s*=\s*//; s/\r$//' | xargs || true)
          if [[ -z "${MOD_VERSION}" ]]; then
            echo "::error::modVersion is empty in gradle.properties"; exit 1
          fi
          echo "MOD_VERSION=${MOD_VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${MOD_VERSION}" >> "$GITHUB_ENV"
          echo "tag=v${MOD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: '25'
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/buildscript.properties
            **/gradle-wrapper.properties
            **/gradle.lockfile
            src/main/resources/hbm_at.cfg

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build reobf jar
        run: ./gradlew releaseBuild

      - name: Create nightly tag
        id: tag
        run: |
          DATE=$(date +'%Y-%m-%d')
          TAG=nightly-$DATE
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f $TAG
          git push --force origin $TAG

      - name: Collect release jars
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          OUT_DIR="release"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          # 收集 build/libs 下的 jar，排除不需要的
          for file in build/libs/*; do
            name=$(basename "$file")
            case "$name" in
              *-downgraded.jar|*-dev-shadow.jar)
                continue
                ;;
            esac
            cp "$file" "$OUT_DIR/$name"
          done
          # 收集 build/publication-libs 下的 jar，严格检查命名
          for file in build/publication-libs/*.jar; do
            name=$(basename "$file")
            if [[ "$name" != *-java25-publish-* ]]; then
              echo "::error::Unexpected publication artifact name: $name"
              exit 1
            fi
            prefix="${name%%-java25-publish-*}"
            rest="${name#*-java25-publish-}"
            case "$rest" in
              *-dev-compile.jar|*-api.jar)
                continue
                ;;
              *.jar)
                version="${rest%.jar}"
                compat_name="${prefix}-${version}-java25.jar"
                ;;
            esac
            cp "$file" "$OUT_DIR/$compat_name"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Nightly Build v${{ env.MOD_VERSION }} (Java25)"
          prerelease: true
          body: |
            Auto Build 
            Commit: `${{ github.sha }}`
          files: release/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old nightly releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 10
          delete_tags: true
          delete_tag_pattern: '^nightly-'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
